<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerias - AvançAraucária</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Header -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md shadow-sm transition-all border-b border-slate-100">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex flex-col justify-center group">
                <h1 class="font-black text-blue-900 text-2xl leading-none tracking-tighter">AVANÇARAUCÁRIA</h1>
                <div class="flex items-center mt-1">
                    <div class="h-px w-4 bg-blue-600 mr-2"></div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em]">Plantando ideias, colhendo ações!</p>
                </div>
            </a>
            <nav class="hidden lg:flex items-center space-x-8">
                <a href="index.html" class="nav-link font-semibold text-slate-700 hover:text-blue-600 text-sm uppercase">Início</a>
                <a href="institucional.html" class="nav-link font-semibold text-slate-700 hover:text-blue-600 text-sm uppercase">Institucional</a>
                <a href="associados.html" class="nav-link font-semibold text-slate-700 hover:text-blue-600 text-sm uppercase">Associados</a>
                <a href="contato.html" class="nav-link font-semibold text-slate-700 hover:text-blue-600 text-sm uppercase">Contato</a>
            </nav>
            <div class="flex items-center space-x-3">
                <button class="p-2.5 bg-slate-100 hover:bg-blue-600 hover:text-white rounded-xl transition-all shadow-sm font-bold text-xs">BUSCAR</button>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="reveal pt-40 pb-20 bg-blue-900 text-white relative overflow-hidden">
        <div class="absolute right-0 top-0 w-1/3 h-full bg-blue-800 -skew-x-12 translate-x-1/2 z-0"></div>
        <div class="container mx-auto px-4 relative z-10 text-center md:text-left">
            <h2 class="text-5xl font-black mb-4">Galerias de Fotos</h2>
            <p class="text-blue-200 text-xl max-w-2xl">Registros dos eventos, plenárias e conquistas do AvançAraucária.</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="reveal py-24 bg-white">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Gallery Item 1 -->
                <div class="relative group h-80 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-slate-200 hover:shadow-blue-600/20 transition-all hover-lift">
                    <img src="https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&q=80&w=800" alt="Galeria" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent flex flex-col justify-end p-10">
                        <span class="text-blue-400 text-xs font-black uppercase tracking-widest mb-2">17 de Junho de 2024</span>
                        <h4 class="text-white font-black text-xl leading-tight">Visita Técnica PIT São José dos Campos</h4>
                    </div>
                </div>
                <!-- ... Adicionar mais conforme necessário ... -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-16 border-t border-slate-100">
        <div class="container mx-auto px-4 text-center">
            <span class="font-black text-slate-900 text-lg uppercase">AVANÇARAUCÁRIA</span>
            <p class="text-xs font-bold text-slate-400 uppercase mt-2">© 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
